version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: medical_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: medical_password
      POSTGRES_DB: medical_records
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: medical_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
  minio:
      image: quay.io/minio/minio
      container_name: medical_storage
      ports:
        - "9000:9000" # Puerto para la API (S3)
        - "9001:9001" # Puerto para la Consola Web
      environment:
        MINIO_ROOT_USER: admin
        MINIO_ROOT_PASSWORD: medical_password
      volumes:
        - minio_data:/data
      command: server /data --console-address ":9001"

  createbuckets:
      image: minio/mc
      depends_on:
        - minio
      entrypoint: >
        /bin/sh -c "
        until (/usr/bin/mc alias set myminio http://minio:9000 admin medical_password); do echo 'Waiting for MinIO...'; sleep 1; done;
        /usr/bin/mc mb myminio/clinical-documents;
        exit 0;
        "
volumes:
  postgres_data:
  minio_data: